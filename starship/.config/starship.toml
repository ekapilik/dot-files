"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](fg:#4078F2)\
$os\
$hostname\
$container\
[](fg:#4078F2 bg:#0184BC)\
$directory\
[](fg:#0184BC bg:#A626A4)\
$git_branch\
$git_status\
$git_metrics\
[](fg:#A626A4 bg:#C18401)\
$c\
$cpp\
$rust\
$nodejs\
$python\
[](fg:#C18401 bg:#50A14F)\
$docker_context\
[](fg:#50A14F bg:#CA1243)\
$cmd_duration\
[](fg:#CA1243 bg:#526EFF)\
$time\
[ ](fg:#526EFF)\
$line_break\
$character\
"""

# always-on so the leading powerline arrow has a deterministic first block
[os]
disabled = false
style = "bg:#4078F2"
format = '[ $symbol ]($style)'

[hostname]
ssh_only = true
style = "bg:#4078F2"
format = '[ $hostname ]($style)'

[container]
style = "bg:#4078F2"
format = '[ $symbol$name ]($style)'

[directory]
style = "bg:#0184BC"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:#A626A4"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#A626A4"
format = '[$all_status$ahead_behind ]($style)'

[git_metrics]
disabled = false
added_style = "bold #50A14F bg:#A626A4"
deleted_style = "bold #E45649 bg:#A626A4"
format = '([+$added ]($added_style))([-$deleted ]($deleted_style))'

[c]
symbol = " "
style = "bg:#C18401"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "bg:#C18401"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#C18401"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:#C18401"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:#C18401"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "bg:#50A14F"
format = '[ $symbol $context ]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#CA1243"
format = '[ 󰔟 $duration ]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#526EFF"
format = '[ 󰥔 $time ]($style)'

[character]
success_symbol = "[❯](bold #50A14F)"
error_symbol = "[❯](bold #E45649)"
